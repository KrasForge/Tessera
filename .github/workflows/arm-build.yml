name: AArch64 ARM build and tests

# CI for the Tessera ARM port:
#   1. Build the AArch64 kernel image (issue #5).
#   2. Run the M1 memory-subsystem host unit tests (issues #7/#8/#10) — the
#      portable, always-on correctness gate.
#   3. Best-effort QEMU raspi4b boot-smoke (issue #5).  The BCM2711 "raspi4b"
#      machine requires QEMU >= 9.0; GitHub runners currently ship an older
#      QEMU, so this step boots only when the machine is available and
#      otherwise reports a skip instead of failing the pipeline.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build-and-boot:
    name: Build + boot-smoke ARM kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AArch64 cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm

      - name: Build AArch64 kernel image
        run: make arm CROSS_COMPILE=aarch64-linux-gnu-

      - name: Verify kernel image exists
        run: |
          test -f build/arm/kernel8.img
          ls -lh build/arm/kernel8.img

      - name: Boot smoke test (QEMU raspi4b, serial stdio)
        run: |
          if ! qemu-system-aarch64 -machine help 2>/dev/null | grep -q '^raspi4b'; then
            echo "::notice::QEMU on this runner does not support the 'raspi4b' machine"
            echo "          (needs QEMU >= 9.0); skipping the hardware boot-smoke."
            exit 0
          fi
          timeout 60 qemu-system-aarch64 \
            -machine raspi4b \
            -nographic \
            -serial stdio \
            -no-reboot \
            -kernel build/arm/kernel8.img \
            2>/dev/null \
          | grep -m1 "Tessera ARM boot OK" \
          && echo "Boot smoke test PASSED" \
          || { echo "Boot smoke test FAILED — boot message not seen within 60 s"; exit 1; }


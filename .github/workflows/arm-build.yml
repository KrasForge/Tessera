name: AArch64 ARM build and tests

# CI for the Tessera ARM port:
#   1. Build the AArch64 kernel image (issue #5).
#   2. Run the M1 memory-subsystem host unit tests (issues #7/#8/#10) — the
#      portable, always-on correctness gate.
#   3. Best-effort QEMU raspi4b boot-smoke (issue #5).  The BCM2711 "raspi4b"
#      machine requires QEMU >= 9.0; GitHub runners currently ship an older
#      QEMU, so this step boots only when the machine is available and
#      otherwise reports a skip instead of failing the pipeline.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build-and-boot:
    name: Build + boot-smoke ARM kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AArch64 cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm

      - name: Build AArch64 kernel image
        run: make arm CROSS_COMPILE=aarch64-linux-gnu-

      - name: Verify kernel image exists
        run: |
          test -f build/arm/kernel8.img
          ls -lh build/arm/kernel8.img

      - name: Boot smoke test (QEMU raspi4b, serial stdio)
        run: |
          if ! qemu-system-aarch64 -machine help 2>/dev/null | grep -q '^raspi4b'; then
            echo "::notice::QEMU on this runner does not support the 'raspi4b' machine"
            echo "          (needs QEMU >= 9.0); skipping the hardware boot-smoke."
            exit 0
          fi
          timeout 60 qemu-system-aarch64 \
            -machine raspi4b \
            -nographic \
            -serial stdio \
            -no-reboot \
            -kernel build/arm/kernel8.img \
            2>/dev/null \
          | grep -m1 "Tessera ARM boot OK" \
          && echo "Boot smoke test PASSED" \
          || { echo "Boot smoke test FAILED — boot message not seen within 60 s"; exit 1; }

  m1-unit-tests:
    name: M1 memory-subsystem host unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run M1 host unit tests (ASan + UBSan)
        run: make test-arm-m1

  m2-unit-tests:
    name: M2 process-isolation host unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run M2 host unit tests (ASan + UBSan)
        run: make test-arm-m2

  audio-tests:
    name: M3 audio - I2S host math + QEMU virt API smoke
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: I2S clock + waveform host unit tests (ASan + UBSan)
        run: make test-arm-i2s

      - name: I2S API smoke on QEMU virt (no faults)
        run: make test-arm-i2s-qemu CROSS_COMPILE=aarch64-linux-gnu-

      - name: DMA double-buffer host unit tests (ASan + UBSan)
        run: make test-arm-audio

      - name: DMA-audio API smoke on QEMU virt (no faults)
        run: make test-arm-audio-qemu CROSS_COMPILE=aarch64-linux-gnu-

      - name: Sine-generator host unit tests (ASan + UBSan)
        run: make test-arm-sine

      - name: Sine-generator API smoke on QEMU virt (no faults)
        run: make test-arm-sine-qemu CROSS_COMPILE=aarch64-linux-gnu-

  interrupt-tests:
    name: M4 interrupts - GIC + generic timer on QEMU virt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: GIC + 1 kHz timer interrupt test on QEMU virt
        run: make test-arm-timer-qemu CROSS_COMPILE=aarch64-linux-gnu-

  scheduler-tests:
    name: M4 RT scheduler - policy host tests + QEMU virt preemption
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: RT-scheduler policy host unit tests (ASan + UBSan)
        run: make test-arm-rtsched

      - name: Preemptive scheduler test on QEMU virt (priority + round-robin)
        run: make test-arm-preempt-qemu CROSS_COMPILE=aarch64-linux-gnu-

  audio-core-tests:
    name: M4 audio core - SMP affinity + lock-free ring on QEMU virt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: Audio-core host unit tests (lock-free ring + watchdog, ASan + UBSan)
        run: make test-arm-smp

      - name: Dedicated audio-core SMP test on QEMU virt (4 cores via PSCI)
        run: make test-arm-smp-qemu CROSS_COMPILE=aarch64-linux-gnu-

  latency-tests:
    name: M4 latency - audio jitter stats host tests + QEMU virt reporting
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: Latency-stats host unit tests (min/max/mean/stddev, ASan + UBSan)
        run: make test-arm-latency

      - name: Audio latency/jitter reporting on QEMU virt (cross-core reporter)
        run: make test-arm-latency-qemu CROSS_COMPILE=aarch64-linux-gnu-

  plugin-abi-tests:
    name: M5 plugin ABI - semantics host test + AArch64 ELF build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Plugin ABI semantic host tests (ASan + UBSan)
        run: make test-arm-plugin-abi

      - name: Reference plugin builds as a valid AArch64 ELF with all ABI symbols
        run: make test-arm-plugin-elf CROSS_COMPILE=aarch64-linux-gnu-

  plugin-loader-tests:
    name: M5 plugin loader - ELF reader host test + QEMU virt isolated load
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: ELF64 reader host unit tests (ASan + UBSan)
        run: make test-arm-elf

      - name: Load plugin into isolated address space on QEMU virt (+ MMU kill)
        run: make test-arm-plugin-load-qemu CROSS_COMPILE=aarch64-linux-gnu-

  shared-ring-tests:
    name: M5 shared ring - lock-free host test + QEMU virt zero-syscall path
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: Shared ring-buffer host unit tests (lock-free + crash, ASan + UBSan)
        run: make test-arm-ringbuf

      - name: Shared ring between host and plugin on QEMU virt (zero syscalls/block)
        run: make test-arm-ring-share-qemu CROSS_COMPILE=aarch64-linux-gnu-

  exception-tests:
    name: Exception handling — host decode + QEMU virt boot
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-toolchain and QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-system-arm

      - name: ESR decoder host unit tests (ASan + UBSan)
        run: make test-arm-exc

      - name: Boot exception harness on QEMU virt (real vectors + dispatch)
        run: make test-arm-exc-qemu CROSS_COMPILE=aarch64-linux-gnu-

      - name: Boot EL0 + SVC harness on QEMU virt (real entry.S + syscalls)
        run: make test-arm-user-qemu CROSS_COMPILE=aarch64-linux-gnu-

      - name: Boot fault-containment harness on QEMU virt (MMU enforced)
        run: make test-arm-fault-qemu CROSS_COMPILE=aarch64-linux-gnu-

      - name: Boot context-switch harness on QEMU virt (round-robin + FPU)
        run: make test-arm-sched-qemu CROSS_COMPILE=aarch64-linux-gnu-
